name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install pyinstaller pillow

      - name: Create icon
        run: python create_icon.py

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed --name "AnnMemo" --icon memo.ico memo_win.pyw --add-data "version.py;." --add-data "updater.py;." --add-data "memo.ico;."

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AnnMemo.exe
          generate_release_notes: true
